<script>
    window.onload = function() {
        try {
            const viewer = new Cesium.Viewer('map-container', {
                // Use the most basic, high-compatibility imagery provider
                imageryProvider: new Cesium.TileMapServiceImageryProvider({
                    url: Cesium.buildModuleUrl('Assets/Textures/NaturalEarthII')
                }),
                baseLayerPicker: false,
                geocoder: false,
                timeline: false,
                animation: false,
                // Force the globe to stay on even if terrain fails
                terrainProvider: new Cesium.EllipsoidTerrainProvider()
            });

            // Set a bright background color so we know the container is active
            viewer.scene.backgroundColor = Cesium.Color.DARKBLUE;
            
            console.log("Success: Map is active.");

        } catch (e) {
            console.error("Cesium Load Fail:", e);
        }
    };
</script>
