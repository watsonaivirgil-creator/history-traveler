<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <title>History Traveler</title>
    <style>
        body { background: #0F172A; color: white; font-family: serif; text-align: center; padding: 50px; }
        .gold-btn { background: #D4AF37; color: #0F172A; padding: 20px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 1.5rem; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>History Traveler</h1>
    <p>The world is your library. Explore history in 3D.</p>
    <br><br>
    <button class="gold-btn" onclick="alert('Starting Journey...')">Begin Exploration</button>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
