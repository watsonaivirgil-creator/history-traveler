<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Traveler</title>
    
    <link href="https://unpkg.com/cesium@1.105.1/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; color: gold; font-family: 'serif'; }
        #map-container { width: 100vw; height: 100vh; background: #111; transition: margin-right 0.5s; }
        
        #chat-sidebar {
            position: absolute; top: 0; right: -400px;
            width: 350px; height: 100%; background: rgba(10, 10, 10, 0.95);
            border-left: 2px solid #D4AF37; z-index: 1000;
            transition: right 0.5s ease; display: flex; flex-direction: column;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }

        #chat-header { padding: 20px; border-bottom: 1px solid #D4AF37; background: #1a1a1a; font-weight: bold; }
        #chat-messages { flex-grow: 1; padding: 20px; overflow-y: auto; font-style: italic; line-height: 1.6; }
        #chat-input-area { padding: 20px; border-top: 1px solid #333; display: flex; }
        
        input { background: #000; border: 1px solid #D4AF37; color: gold; padding: 10px; flex-grow: 1; outline: none; }
        button#send-btn { background: #D4AF37; color: black; border: none; padding: 10px 15px; cursor: pointer; font-weight: bold; }
        
        #status-overlay { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #D4AF37; }
    </style>
</head>
<body>

    <div id="status-overlay"><strong>SYSTEM:</strong> <span id="status-text">INITIALIZING...</span></div>
    
    <div id="chat-sidebar">
        <div id="chat-header">CHRONO-LINK: <span id="location-name">Unknown</span></div>
        <div id="chat-messages">
            <p>Welcome, Traveler. I am the Chrono-Guide. What mysteries of this era shall we unearth?</p>
        </div>
        <div id="chat-input-area">
            <input type="text" id="user-input" placeholder="Ask the past...">
            <button id="send-btn">SEND</button>
        </div>
        <button onclick="closeSidebar()" style="background:none; color:grey; border:none; padding:10px; cursor:pointer;">[ Close Link ]</button>
    </div>

    <div id="map-container"></div>

    <script>
        let viewer;
        const status = document.getElementById('status-text');

        function startEngine() {
            try {
                viewer = new Cesium.Viewer('map-container', {
                    imageryProvider: new Cesium.UrlTemplateImageryProvider({
                        url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
                        subdomains: ['a', 'b', 'c']
                    }),
                    baseLayerPicker: false, geocoder: false, timeline: false, animation: false
                });

                const pyramid = viewer.entities.add({
                    name: "The Great Pyramid",
                    position: Cesium.Cartesian3.fromDegrees(31.1342, 29.9792, 146.0),
                    billboard: { image: 'https://img.icons8.com/color/48/000000/pyramids.png', verticalOrigin: Cesium.VerticalOrigin.BOTTOM },
                    label: { text: 'Great Pyramid', font: '12pt serif', fillColor: Cesium.Color.GOLD, pixelOffset: new Cesium.Cartesian2(0, -40) }
                });

                viewer.screenSpaceEventHandler.setInputAction(function onLeftClick(movement) {
                    const pickedObject = viewer.scene.pick(movement.position);
                    if (Cesium.defined(pickedObject) && pickedObject.id === pyramid) {
                        openSidebar("The Great Pyramid of Giza");
                    }
                }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

                viewer.zoomTo(pyramid);
                status.innerText = "LINK ESTABLISHED";
                setTimeout(() => document.getElementById('status-overlay').style.display = 'none', 2000);

                // HOOK UP CHAT AFTER ENGINE STARTS
                initChatLogic();

            } catch (e) { status.innerText = "ERR: " + e.message; }
        }

        function openSidebar(name) {
            document.getElementById('location-name').innerText = name;
            document.getElementById('chat-sidebar').style.right = "0px";
        }

        function closeSidebar() {
            document.getElementById('chat-sidebar').style.right = "-400px";
        }

        // --- NEW CHAT LOGIC FUNCTIONS ---
        function initChatLogic() {
            const sendBtn = document.getElementById('send-btn');
            const userInput = document.getElementById('user-input');

            sendBtn.addEventListener('click', sendMessage);
            userInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') sendMessage();
            });
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const chatMessages = document.getElementById('chat-messages');
            
            if (input.value.trim() !== "") {
                chatMessages.innerHTML += `<p style="color: white; font-style: normal;"><strong>You:</strong> ${input.value}</p>`;
                
                const userText = input.value.toLowerCase();
                let response = "The sands of time are vast. Ask me about the Pharaohs or the construction of this monument.";
                
                if(userText.includes("who built")) response = "Pharaoh Khufu commissioned this Great Pyramid as his eternal tomb around 2560 BCE.";
                if(userText.includes("how tall")) response = "It stood at 146.6 meters (481 feet), making it the tallest structure on Earth for over 3,000 years.";

                setTimeout(() => {
                    chatMessages.innerHTML += `<p><strong>Guide:</strong> ${response}</p>`;
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }, 800);

                input.value = "";
            }
        }

        // Script loading logic
        const script = document.createElement('script');
        script.src = "https://unpkg.com/cesium@1.105.1/Build/Cesium/Cesium.js";
        script.onload = () => setTimeout(startEngine, 1000);
        document.head.appendChild(script);
    </script>
</body>
</html>
