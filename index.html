<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Traveler - Chrono-OS v2.6.1</title>
    <link rel="manifest" href="manifest.json">
    
    <!-- MANDATORY: FULL PATHS TO THE 3D ENGINE FILES -->
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Cesium.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; color: gold; font-family: 'Georgia', serif; }
        #map-container { width: 100vw; height: 100vh; background: #111; }
        
        #nav-overlay { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            z-index: 100; display: flex; gap: 10px; background: rgba(0,0,0,0.8); 
            padding: 10px; border: 1px solid #D4AF37; border-radius: 50px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        .nav-btn { 
            background: none; border: 1px solid #444; color: #aaa; padding: 8px 15px; 
            border-radius: 20px; cursor: pointer; font-size: 10px; text-transform: uppercase; 
            letter-spacing: 1px; transition: 0.3s;
        }
        .nav-btn:hover { border-color: #D4AF37; color: gold; background: rgba(212, 175, 55, 0.1); }

        #chat-sidebar {
            position: absolute; top: 0; right: -400px; 
            width: 320px; height: 100%; background: rgba(10, 10, 10, 0.98);
            border-left: 1px solid #D4AF37; z-index: 1000;
            transition: right 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            display: flex; flex-direction: column;
        }
        #chat-header { padding: 20px; border-bottom: 1px solid #D4AF37; background: #111; font-weight: bold; }
        #chat-messages { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 0.95em; line-height: 1.6; }
        #branch-container { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 8px; }
        .branch-btn { background: #1a1a1a; border: 1px solid #D4AF37; color: gold; padding: 6px 10px; cursor: pointer; font-size: 10px; border-radius: 2px; }
        .branch-btn:hover { background: #D4AF37; color: #000; }
        .site-image { width: 100%; border-radius: 2px; margin-bottom: 15px; border: 1px solid #444; }
        
        #chat-input-area { padding: 15px; background: #050505; border-top: 1px solid #222; display: flex; }
        input { background: #111; border: 1px solid #333; color: gold; padding: 12px; flex-grow: 1; outline: none; }
        button#send-btn { background: #D4AF37; color: black; border: none; padding: 0 15px; cursor: pointer; font-weight: bold; }
        
        #status-overlay { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.85); padding: 8px 15px; border-left: 3px solid #D4AF37; font-size: 11px; }
        .close-link { background: none; color: #666; border: none; padding: 15px; cursor: pointer; font-size: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="status-overlay">CHRONO-LINK: <span id="status-text">ONLINE</span></div>

    <div id="nav-overlay">
        <button class="nav-btn" onclick="flyToRegion('Egypt')">Egypt</button>
        <button class="nav-btn" onclick="flyToRegion('Italy')">Italy</button>
        <button class="nav-btn" onclick="flyToRegion('Greece')">Greece</button>
        <button class="nav-btn" onclick="flyToRegion('Global')">Orbit</button>
    </div>
    
    <div id="chat-sidebar">
        <div id="chat-header">ARCHIVE: <span id="location-name">READY</span></div>
        <div id="chat-messages"><p style="color: #666; font-style: italic;">Initiate link by selecting a coordinate...</p></div>
        <div id="chat-input-area">
            <input type="text" id="user-input" placeholder="Query data...">
            <button id="send-btn" onclick="sendMessage()">SEND</button>
        </div>
        <button onclick="closeSidebar()" class="close-link">[ Disconnect ]</button>
    </div>

    <div id="map-container"></div>

    <script src="app.js"></script>
</body>
</html>
