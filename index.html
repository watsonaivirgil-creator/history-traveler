<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Traveler</title>
    
    <link href="https://unpkg.com/cesium@1.105.1/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; color: gold; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map-container { width: 100vw; height: 100vh; background: #111; }
        #status-overlay { 
            position: absolute; top: 20px; left: 20px; z-index: 100; 
            background: rgba(0,0,0,0.85); padding: 15px; border: 1px solid #D4AF37;
            border-radius: 4px; box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>

    <div id="status-overlay">
        <strong>SYSTEM:</strong> <span id="status-text">CONNECTING TO SATELLITE...</span>
    </div>
    
    <div id="map-container"></div>

    <script>
        const status = document.getElementById('status-text');

        // 1. ENGINE DEFINITION
        function startEngine() {
            try {
                const viewer = new Cesium.Viewer('map-container', {
                    imageryProvider: new Cesium.UrlTemplateImageryProvider({
                        url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
                        subdomains: ['a', 'b', 'c']
                    }),
                    baseLayerPicker: false,
                    geocoder: false,
                    timeline: false,
                    animation: false,
                    infoBox: false,
                    selectionIndicator: false
                });

                // Fly to the Great Pyramid of Giza
                viewer.camera.flyTo({
                    destination: Cesium.Cartesian3.fromDegrees(31.1342, 29.9792, 5000.0),
                    duration: 2
                });

                status.innerText = "SATELLITE LINK ESTABLISHED";
                
                // Keep the success message visible for a moment then hide
                setTimeout(() => {
                    document.getElementById('status-overlay').style.transition = "opacity 1s";
                    document.getElementById('status-overlay').style.opacity = "0";
                    setTimeout(() => {
                        document.getElementById('status-overlay').style.display = "none";
                    }, 1000);
                }, 3000);

            } catch (e) {
                status.innerHTML = "<span style='color:red;'>LINK ERROR: " + e.message + "</span>";
                console.error("Cesium Initialization Failed:", e);
            }
        }

        // 2. LIBRARY LOADING LOGIC
        const script = document.createElement('script');
        script.src = "https://unpkg.com/cesium@1.105.1/Build/Cesium/Cesium.js";
        script.async = false;

        script.onload = function() {
            status.innerText = "LIBRARY LOADED. HANDSHAKING...";
            // Brief pause to ensure the 'Cesium' object is ready in the browser's memory
            setTimeout(startEngine, 800);
        };

        script.onerror = function() {
            status.innerText = "CONNECTION FAILED. CHECK NETWORK.";
        };

        document.head.appendChild(script);
    </script>
</body>
</html>
