<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Traveler</title>
    
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Cesium.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; color: gold; font-family: 'serif'; }
        #map-container { width: 100vw; height: 100vh; background: #111; }
        #chat-sidebar {
            position: absolute; top: 0; right: -400px; width: 320px; height: 100%; 
            background: rgba(15, 15, 15, 0.98); border-left: 2px solid #D4AF37; z-index: 1000;
            transition: right 0.5s ease; display: flex; flex-direction: column;
        }
        #chat-header { padding: 15px; border-bottom: 1px solid #D4AF37; background: #1a1a1a; font-weight: bold; }
        #chat-messages { flex-grow: 1; padding: 15px; overflow-y: auto; font-style: italic; font-size: 0.9em; }
        #chat-input-area { padding: 15px; border-top: 1px solid #333; display: flex; }
        input { background: #000; border: 1px solid #D4AF37; color: gold; padding: 10px; flex-grow: 1; outline: none; width: 50%; }
        button#send-btn { background: #D4AF37; color: black; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
        #status-overlay { position: absolute; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.9); padding: 10px; border: 1px solid #D4AF37; }
    </style>
</head>
<body>

    <div id="status-overlay"><strong>CHRONO-OS:</strong> <span id="status-text">WAITING FOR CORE...</span></div>
    
    <div id="chat-sidebar">
        <div id="chat-header">LINK: <span id="location-name">None</span></div>
        <div id="chat-messages"><p>Select a Chrono-Point on the globe.</p></div>
        <div id="chat-input-area">
            <input type="text" id="user-input" placeholder="Ask...">
            <button id="send-btn">SEND</button>
        </div>
        <button onclick="closeSidebar()" style="background:none; color:grey; border:none; padding:10px; cursor:pointer;">[ Close ]</button>
    </div>

    <div id="map-container"></div>

    <script>
        let viewer;
        let currentSiteKey = "";

        const historyData = {
            "Giza": { name: "Pyramid of Giza", lat: 31.1342, lon: 29.9792, fact: "The Great Pyramid of Khufu." },
            "Rome": { name: "The Colosseum", lat: 12.4922, lon: 41.8902, fact: "Rome's grand arena of stone." },
            "Athens": { name: "The Parthenon", lat: 23.7285, lon: 37.9715, fact: "The crown of the Acropolis." }
        };

        // RETRY LOGIC FOR LOW-POWER DEVICES
        function startEngine() {
            const status = document.getElementById('status-text');
            
            if (typeof Cesium === 'undefined') {
                status.innerText = "RETRYING HANDSHAKE...";
                setTimeout(startEngine, 1000); // Wait 1 second and try again
                return;
            }

            try {
                status.innerText = "CORE DETECTED. LOADING 3D...";
                
                viewer = new Cesium.Viewer('map-container', {
                    imageryProvider: new Cesium.UrlTemplateImageryProvider({
                        url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
                        subdomains: ['a', 'b', 'c']
                    }),
                    baseLayerPicker: false, geocoder: false, timeline: false, animation: false,
                    requestRenderMode: true // VITAL for mobile performance
                });

                // Load buildings without terrain to save VRAM
                viewer.scene.primitives.add(Cesium.createOsmBuildings());

                Object.keys(historyData).forEach(key => {
                    const site = historyData[key];
                    viewer.entities.add({
                        id: key,
                        position: Cesium.Cartesian3.fromDegrees(site.lat, site.lon, 50),
                        label: { text: site.name, font: '12pt serif', fillColor: Cesium.Color.GOLD, pixelOffset: new Cesium.Cartesian2(0, -40) },
                        point: { pixelSize: 10, color: Cesium.Color.GOLD }
                    });
                });

                viewer.screenSpaceEventHandler.setInputAction(function(movement) {
                    const picked = viewer.scene.pick(movement.position);
                    if (picked && picked.id && historyData[picked.id.id]) {
                        const site = historyData[picked.id.id];
                        currentSiteKey = picked.id.id;
                        openSidebar(site.name, site.fact);
                        viewer.camera.flyTo({
                            destination: Cesium.Cartesian3.fromDegrees(site.lat, site.lon, 800),
                            orientation: { pitch: Cesium.Math.toRadians(-25.0) }
                        });
                    }
                }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

                status.innerText = "SYSTEM ACTIVE";
                setTimeout(() => document.getElementById('status-overlay').style.display='none', 2000);
                initChat();

            } catch (e) {
                status.innerText = "GPU REFUSED 3D: " + e.message;
            }
        }

        function openSidebar(name, fact) {
            document.getElementById('location-name').innerText = name;
            document.getElementById('chat-messages').innerHTML = `<p><strong>Guide:</strong> ${fact}</p>`;
            document.getElementById('chat-sidebar').style.right = "0px";
        }

        function closeSidebar() { document.getElementById('chat-sidebar').style.right = "-400px"; }

        function initChat() {
            document.getElementById('send-btn').onclick = sendMessage;
            document.getElementById('user-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const messages = document.getElementById('chat-messages');
            if (input.value.trim() !== "") {
                messages.innerHTML += `<p style="color:white; font-style:normal;"><strong>You:</strong> ${input.value}</p>`;
                setTimeout(() => {
                    messages.innerHTML += `<p><strong>Guide:</strong> Architecture is the silent language of the past.</p>`;
                    messages.scrollTop = messages.scrollHeight;
                }, 800);
                input.value = "";
            }
        }

        // Start attempt as soon as basic script is read
        startEngine();
    </script>
</body>
</html>
