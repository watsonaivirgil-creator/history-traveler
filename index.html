<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <title>History Traveler</title>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Cesium.js"></script>
    <style>
    /* Force the app to fill the entire screen and remove scrollbars */
    html, body { 
        margin: 0; 
        padding: 0; 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        background-color: #000; 
    }
    
    /* Ensure the container is truly 100% of the viewable area */
    #map-container { 
        width: 100vw; 
        height: 100dvh; /* 'dvh' is better for mobile/Chromebook chrome */
        display: block;
    }

    .ui-overlay { 
        position: absolute; 
        top: 20px; 
        left: 20px; 
        z-index: 1000; /* Put this high above the map */
        pointer-events: none; 
        color: #D4AF37; 
        font-family: 'Times New Roman', serif; 
    }
</style>
</head>
<body>
    <div class="ui-overlay">
        <h1>History Traveler</h1>
    </div>
    <div id="map-container"></div>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js'); }
    </script>
</body>
</html>
