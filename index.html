<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Traveler - Chrono-OS v2.4</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cesium.com" rel="stylesheet">
    <script src="https://cesium.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; color: gold; font-family: 'Georgia', serif; }
        #map-container { width: 100vw; height: 100vh; background: #111; }
        #chat-sidebar {
            position: absolute; top: 0; right: -400px; 
            width: 320px; height: 100%; background: rgba(10, 10, 10, 0.95);
            border-left: 1px solid #D4AF37; z-index: 1000;
            transition: right 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            display: flex; flex-direction: column;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        #chat-header { padding: 20px; border-bottom: 1px solid #D4AF37; background: #111; font-weight: bold; letter-spacing: 1px; }
        #chat-messages { flex-grow: 1; padding: 15px; overflow-y: auto; font-size: 0.95em; line-height: 1.5; }
        .guide-text { color: #ccc; font-style: italic; }
        .site-image { width: 100%; border: 1px solid #444; border-radius: 2px; margin-bottom: 15px; filter: sepia(30%); }
        #chat-input-area { padding: 15px; background: #050505; border-top: 1px solid #222; display: flex; }
        input { background: #111; border: 1px solid #333; color: gold; padding: 12px; flex-grow: 1; outline: none; font-size: 14px; }
        button#send-btn { background: #D4AF37; color: black; border: none; padding: 0 15px; cursor: pointer; font-weight: bold; }
        #status-overlay { 
            position: absolute; top: 20px; left: 20px; z-index: 100; 
            background: rgba(0,0,0,0.85); padding: 8px 15px; 
            border-left: 3px solid #D4AF37; font-size: 12px;
            transition: opacity 1s ease;
        }
        .close-link { background: none; color: #666; border: none; padding: 10px; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .close-link:hover { color: gold; }
    </style>
</head>
<body>
    <div id="status-overlay">STATUS: <span id="status-text">INITIALIZING...</span></div>
    <div id="chat-sidebar">
        <div id="chat-header">CHRONO-LINK: <span id="location-name">READY</span></div>
        <div id="chat-messages"><p class="guide-text">Awaiting coordinate selection...</p></div>
        <div id="chat-input-area">
            <input type="text" id="user-input" placeholder="Query the site...">
            <button id="send-btn" onclick="sendMessage()">SEND</button>
        </div>
        <button onclick="closeSidebar()" class="close-link">[ Disconnect ]</button>
    </div>
    <div id="map-container"></div>
    <script src="app.js"></script>
</body>
</html>
